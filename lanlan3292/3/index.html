<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>lanlan3292</title>
  <link rel="stylesheet" href="assets/style.css"/>
</head>
<body>

  <!-- Language dropdown — populated by app.js after I18n.init() -->
  <div class="lang-dd-wrap" id="langDdWrap">
    <button class="lang-dd-btn" id="langDdBtn">
      <span id="langDdFlag">🌐</span>
      <span id="langDdLabel"></span>
      <span class="lang-dd-chevron">▼</span>
    </button>
    <div class="lang-dd-panel" id="langDdPanel"></div>
  </div>

  <div class="card" id="card">
    <div class="label"    id="label"></div>
    <div class="username">lanlan<span>3292</span></div>
    <div class="handle">
      <a href="https://github.com/lanlan3292" target="_blank" id="handle"></a>
    </div>

    <p class="bio" id="bio"></p>

    <div class="section-title" id="sectionInterest"></div>
    <div class="tags"          id="tags"></div>

    <div class="section-title" id="sectionOverview"></div>
    <div class="code-bar-track" id="codeBar"></div>
    <div class="code-legend"    id="codeLegend"></div>

    <div class="footer">
      <div class="status">
        <span class="dot"></span><span id="status"></span>
      </div>
      <div class="year" id="year"></div>
    </div>
  </div>

  <script src="assets/i18n.js"></script>
  <script src="assets/code-stats.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
